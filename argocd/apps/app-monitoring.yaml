# =============================================================================
# Application: monitoring (kube-prometheus-stack)
# -----------------------------------------------------------------------------
# Installs Prometheus + Alertmanager + Grafana + node-exporter + kube-state-metrics
# from the prometheus-community Helm repo into the `monitoring` namespace.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cloudkitchen

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 62.3.0 # pin chart version; bump deliberately
    helm:
      values: |
        # ---- minimal sensible defaults ----
        fullnameOverride: kube-prometheus
        grafana:
          enabled: true
          defaultDashboardsEnabled: true
          # Expose Grafana behind the platform ingress on a dedicated host.
          ingress:
            enabled: true
            ingressClassName: traefik
            hosts:
              - grafana.cloudkitchen.example.com
        prometheus:
          prometheusSpec:
            retention: 15d
            # Discover ServiceMonitors across all namespaces (incl. cloudkitchen).
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                cpu: "1"
                memory: 2Gi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi
        alertmanager:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # kube-prometheus-stack ships very large CRDs; SSA avoids the annotation limit.
      - ServerSideApply=true
