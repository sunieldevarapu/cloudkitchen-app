# clusterissuer.yaml
# -----------------------------------------------------------------------------
# Let's Encrypt ClusterIssuers for cert-manager, using the HTTP-01 challenge
# solved through the Traefik ingress controller.
#
# Prereqs:
#   - cert-manager installed (e.g. helm install cert-manager jetstack/cert-manager
#     -n cert-manager --set crds.enabled=true)
#   - Traefik running as the cluster ingress (ingressClassName: traefik)
#
# Always test against STAGING first to avoid Let's Encrypt rate limits, then
# switch the Certificate's issuerRef to letsencrypt-prod.
# -----------------------------------------------------------------------------
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@cloudkitchen.example.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: traefik
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@cloudkitchen.example.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: traefik
