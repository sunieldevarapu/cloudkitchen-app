# secret.example.yaml
# -----------------------------------------------------------------------------
# !!! EXAMPLE ONLY — DO NOT COMMIT REAL SECRETS !!!
#
# This file documents the SHAPE of the application Secret. The values here are
# obvious placeholders. In every real environment the actual Secret must be
# delivered by one of the mechanisms below, NOT by committing this file with
# real values:
#
#   * External Secrets Operator (ESO) — recommended.
#       Pulls from AWS Secrets Manager / SSM Parameter Store and creates the
#       Kubernetes Secret in-cluster. Access is granted via IRSA.
#
#   * Sealed Secrets (bitnami) — encrypt with `kubeseal`, the SealedSecret
#       (safe to commit) is decrypted in-cluster by the controller.
#
# A plain Secret like the one below should only ever be created imperatively
# for local/dev clusters, never checked into git with real material.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: cloudkitchen-app-secrets
  namespace: cloudkitchen
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_ME_use-a-long-random-string"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_USER: "cloudkitchen"
  DB_PASSWORD: "REPLACE_ME"
  DB_NAME: "cloudkitchen"
  REDIS_ADDR: "redis:6379"
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"

---
