# =============================================================================
# CloudKitchen CI/CD — GCP variant (Artifact Registry)
# -----------------------------------------------------------------------------
# Pipeline overview (mirrors ci.yaml; only the cloud provider differs):
#   build          : matrix over all 9 services -> docker build, Trivy scan
#                    (fail on HIGH/CRITICAL), push to GCP Artifact Registry
#                    (tags: <sha>, latest).
#   update-gitops  : on push to main only -> bump the image string for each
#                    service in helm/cloudkitchen/values.yaml and commit it back.
#                    ArgoCD (not this pipeline) performs the actual deployment.
#
# This pipeline NEVER runs `helm upgrade` or `kubectl apply` — deployment is
# strictly ArgoCD's responsibility. The only "deploy" action here is the git
# commit of updated image tags.
#
# Required GitHub configuration (see docs/gcp/03-github-actions-cicd.md):
#   Secrets:
#     GCP_SA_KEY       - JSON key for a service account with roles
#                        roles/artifactregistry.writer (push images) +
#                        roles/iam.serviceAccountUser (impersonation, if used)
#     GITOPS_TOKEN     - (optional) PAT with `contents:write` if branch
#                        protection blocks the default GITHUB_TOKEN
#   Variables:
#     GCP_PROJECT_ID   - e.g. project-d31a3358-346c-40e8-bda
#     GCP_REGION       - e.g. us-central1
#     AR_REPO          - e.g. cloudkitchen-registry
# =============================================================================
name: CI (GCP / Artifact Registry)

on:
  push:
    branches: [main]
    # Only run when service source or build inputs change.
    paths:
      - "auth-service/**"
      - "user-service/**"
      - "restaurant-service/**"
      - "menu-service/**"
      - "order-service/**"
      - "payment-service/**"
      - "delivery-service/**"
      - "notification-service/**"
      - "frontend/**"
      - ".github/workflows/ci-gcp.yaml"
  pull_request:
    paths:
      - "auth-service/**"
      - "user-service/**"
      - "restaurant-service/**"
      - "menu-service/**"
      - "order-service/**"
      - "payment-service/**"
      - "delivery-service/**"
      - "notification-service/**"
      - "frontend/**"
      - ".github/workflows/ci-gcp.yaml"

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-gcp-${{ github.ref }}
  cancel-in-progress: true

# Repository-/org-level values come from GitHub "Variables" (vars.*) and
# "Secrets" (secrets.*). Centralized here so each step stays terse.
env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  AR_REPO: ${{ vars.AR_REPO }}
  # Final registry host. e.g. us-central1-docker.pkg.dev
  AR_HOST: ${{ vars.GCP_REGION }}-docker.pkg.dev
  # Full image path prefix. e.g.
  # us-central1-docker.pkg.dev/project-.../cloudkitchen-registry
  AR_PREFIX: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}

jobs:
  # ===========================================================================
  # build: build, scan and push every service image IN PARALLEL via a matrix.
  # ===========================================================================
  build:
    name: build (${{ matrix.service }})
    runs-on: ubuntu-latest

    # Static SA key auth is used (stored as a GitHub Secret), so the job only
    # needs read access to the repo contents.
    permissions:
      contents: read

    strategy:
      fail-fast: false # one service failing must not cancel the others
      matrix:
        # The 9 build targets. `service` is both the source directory name and
        # the AR image name (AR repo is shared; images differ by name).
        service:
          - auth-service
          - user-service
          - restaurant-service
          - menu-service
          - order-service
          - payment-service
          - delivery-service
          - notification-service
          - frontend

    steps:
      # ---- 1. Checkout source ------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- 2. Compute a short (7-char) git SHA used as the image tag ---------
      - name: Compute short SHA
        id: vars
        run: echo "sha=$(echo "${GITHUB_SHA}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      # ---- 3. Authenticate to GCP using a service-account JSON key -----------
      #         The key is stored as the GitHub Secret GCP_SA_KEY. Future
      #         hardening: switch to Workload Identity Federation (OIDC).
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ---- 4. Install gcloud (needed for the docker credential helper) -------
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      # ---- 5. Configure docker to push to Artifact Registry ------------------
      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.AR_HOST }} --quiet

      # ---- 6. Set up Buildx (enables layer caching + reproducible builds) ----
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---- 7. Build the image LOCALLY (load into the runner's docker so Trivy
      #         can scan it before we ever push it to AR) ---------------------
      - name: Build image (local, for scanning)
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: false
          load: true # make the image available to the local docker daemon
          tags: |
            ${{ env.AR_PREFIX }}/${{ matrix.service }}:${{ steps.vars.outputs.sha }}
            ${{ env.AR_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      # ---- 8. Trivy image scan — FAIL the job on HIGH or CRITICAL CVEs -------
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.AR_PREFIX }}/${{ matrix.service }}:${{ steps.vars.outputs.sha }}
          format: table
          exit-code: "1" # non-zero exit fails the job
          severity: HIGH,CRITICAL
          ignore-unfixed: true # only gate on vulns that have a fix available
          vuln-type: os,library

      # ---- 9. Push to Artifact Registry — only after a clean scan, only on main
      #         PRs build + scan (gate) but do NOT push images.
      - name: Push image to Artifact Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.AR_PREFIX }}/${{ matrix.service }}:${{ steps.vars.outputs.sha }}
            ${{ env.AR_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}

  # ===========================================================================
  # update-gitops: bump image strings in helm/cloudkitchen/values.yaml + commit.
  # Runs once (not per-service) after ALL build matrix jobs succeed, on main only.
  # ArgoCD renders the chart with this same values.yaml, so the commit is the
  # deploy trigger.
  # ===========================================================================
  update-gitops:
    name: update-gitops
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # Need write access to push the image-tag commit back to the repo.
    permissions:
      contents: write

    steps:
      # ---- 1. Checkout the repo at the branch HEAD (so we can push) ----------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          # Use a token that is allowed to push to main. By default GITHUB_TOKEN
          # works unless branch protection blocks it; otherwise set GITOPS_TOKEN.
          token: ${{ secrets.GITOPS_TOKEN || secrets.GITHUB_TOKEN }}

      # ---- 2. Compute the same short SHA used for the image tags -------------
      - name: Compute short SHA
        id: vars
        run: echo "sha=$(echo "${GITHUB_SHA}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      # ---- 3. Install yq (YAML processor) for in-place edits -----------------
      - name: Install yq
        uses: mikefarah/yq@v4.44.3

      # ---- 4. Patch the per-service `image:` string in the chart values ------
      #         The umbrella chart uses a flat, camelCase key per service with a
      #         single full image string, e.g.  authService: { image: <repo>:<tag> }.
      #         We map each source dir (auth-service) -> values key (authService)
      #         and set the whole image string to the freshly pushed AR tag.
      - name: Update image tags in helm/cloudkitchen/values.yaml
        env:
          NEW_TAG: ${{ steps.vars.outputs.sha }}
        run: |
          set -euo pipefail
          FILE="helm/cloudkitchen/values.yaml"
          SERVICES="auth-service user-service restaurant-service menu-service \
                    order-service payment-service delivery-service \
                    notification-service frontend"

          # kebab-case dir -> camelCase values key (auth-service -> authService).
          to_camel() {
            local IFS='-'; read -ra p <<< "$1"; local out="${p[0]}"
            for w in "${p[@]:1}"; do out+="${w^}"; done
            echo "$out"
          }

          for svc in $SERVICES; do
            key="$(to_camel "$svc")"
            img="${AR_PREFIX}/${svc}:${NEW_TAG}"
            echo "Setting .${key}.image = ${img}"
            yq -i ".${key}.image = \"${img}\"" "$FILE"
          done
          echo "----- resulting $FILE -----"
          cat "$FILE"

      # ---- 5. Commit & push the updated tags. ArgoCD takes it from here. -----
      - name: Commit & push GitOps update
        env:
          NEW_TAG: ${{ steps.vars.outputs.sha }}
        run: |
          set -euo pipefail
          git config user.name "cloudkitchen-ci[bot]"
          git config user.email "ci-bot@cloudkitchen.example.com"
          # No-op safely if nothing changed (e.g. re-run on same SHA).
          if git diff --quiet -- helm/cloudkitchen/values.yaml; then
            echo "No image tag changes to commit."
            exit 0
          fi
          git add helm/cloudkitchen/values.yaml
          git commit -m "ci(gitops): bump image tags to ${NEW_TAG} [skip ci]"
          git push origin main
