# =============================================================================
# CloudKitchen CI/CD — build, scan, push, and GitOps-update
# -----------------------------------------------------------------------------
# Pipeline overview:
#   build          : matrix over all 9 services -> docker build, Trivy scan
#                    (fail on HIGH/CRITICAL), push to ECR (tags: <sha>, latest).
#   update-gitops  : on push to main only -> bump the image string for each
#                    service in helm/cloudkitchen/values.yaml and commit it back.
#                    ArgoCD (not this pipeline) performs the actual deployment.
#
# This pipeline NEVER runs `helm upgrade` or `kubectl apply` — deployment is
# strictly ArgoCD's responsibility. The only "deploy" action here is the git
# commit of updated image tags.
# =============================================================================
name: CI (AWS / ECR)

# NOTE — Disabled auto-trigger until the AWS account is set up.
# Active workflow is `ci-gcp.yaml`, which pushes to GCP Artifact Registry.
# Re-enable the `push`/`pull_request` triggers below once the AWS_*
# secrets are configured and the ECR repos exist (Terraform Phase 1).
on:
  workflow_dispatch: {} # manual-only for now
  # push:
  #   branches: [main]
  #   paths:
  #     - "auth-service/**"
  #     - "user-service/**"
  #     - "restaurant-service/**"
  #     - "menu-service/**"
  #     - "order-service/**"
  #     - "payment-service/**"
  #     - "delivery-service/**"
  #     - "notification-service/**"
  #     - "frontend/**"
  #     - ".github/workflows/ci.yaml"
  # pull_request:
  #   paths:
  #     - "auth-service/**"
  #     - "user-service/**"
  #     - "restaurant-service/**"
  #     - "menu-service/**"
  #     - "order-service/**"
  #     - "payment-service/**"
  #     - "delivery-service/**"
  #     - "notification-service/**"
  #     - "frontend/**"
  #     - ".github/workflows/ci.yaml"

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Repository-/org-level values are read from GitHub "Variables" (vars.*) and
# "Secrets" (secrets.*). See .github/workflows/README.md for the full list.
env:
  AWS_REGION: us-east-1
  # ECR registry host: <ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  # All images live under the cloudkitchen/ ECR namespace.
  IMAGE_PREFIX: cloudkitchen

jobs:
  # ===========================================================================
  # build: build, scan and push every service image IN PARALLEL via a matrix.
  # ===========================================================================
  build:
    name: build (${{ matrix.service }})
    runs-on: ubuntu-latest

    # Static IAM keys are used for AWS auth (stored as GitHub Secrets), so the
    # job only needs read access to the repo contents.
    permissions:
      contents: read

    strategy:
      fail-fast: false # one service failing must not cancel the others
      matrix:
        # The 9 build targets. `service` is both the source directory name and
        # the ECR repository name (ECR repo = cloudkitchen/<service>).
        service:
          - auth-service
          - user-service
          - restaurant-service
          - menu-service
          - order-service
          - payment-service
          - delivery-service
          - notification-service
          - frontend

    steps:
      # ---- 1. Checkout source ------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- 2. Compute a short (7-char) git SHA used as the image tag ----------
      - name: Compute short SHA
        id: vars
        run: echo "sha=$(echo "${GITHUB_SHA}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      # ---- 3. Authenticate to AWS with static IAM access keys ----------------
      #         Keys are stored as GitHub repo/org Secrets (never in the repo).
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ---- 4. Log in to Amazon ECR -------------------------------------------
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ---- 5. Set up Buildx (enables layer caching + reproducible builds) -----
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---- 6. Build the image LOCALLY (load into the runner's docker so Trivy
      #         can scan it before we ever push it to ECR) ----------------------
      - name: Build image (local, for scanning)
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: false
          load: true # make the image available to the local docker daemon
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ steps.vars.outputs.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      # ---- 7. Trivy image scan — FAIL the job on HIGH or CRITICAL CVEs --------
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ steps.vars.outputs.sha }}
          format: table
          exit-code: "1" # non-zero exit fails the job
          severity: HIGH,CRITICAL
          ignore-unfixed: true # only gate on vulns that have a fix available
          vuln-type: os,library

      # ---- 8. Push to ECR — only after a clean scan, and only on main ---------
      #         PRs build + scan (gate) but do NOT push images.
      - name: Push image to ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ steps.vars.outputs.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}

  # ===========================================================================
  # update-gitops: bump image strings in helm/cloudkitchen/values.yaml + commit.
  # Runs once (not per-service) after ALL build matrix jobs succeed, on main only.
  # ArgoCD renders the chart with this same values.yaml, so the commit is the
  # deploy trigger.
  # ===========================================================================
  update-gitops:
    name: update-gitops
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # Need write access to push the image-tag commit back to the repo.
    permissions:
      contents: write

    steps:
      # ---- 1. Checkout the repo at the branch HEAD (so we can push) -----------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          # Use a token that is allowed to push to main. By default GITHUB_TOKEN
          # works unless branch protection blocks it; otherwise set GITOPS_TOKEN.
          token: ${{ secrets.GITOPS_TOKEN || secrets.GITHUB_TOKEN }}

      # ---- 2. Compute the same short SHA used for the image tags --------------
      - name: Compute short SHA
        id: vars
        run: echo "sha=$(echo "${GITHUB_SHA}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      # ---- 3. Install yq (YAML processor) for in-place edits ------------------
      - name: Install yq
        uses: mikefarah/yq@v4.44.3

      # ---- 4. Patch the per-service `image:` string in the chart values ------
      #         The umbrella chart uses a flat, camelCase key per service with a
      #         single full image string, e.g.  authService: { image: <repo>:<tag> }.
      #         We map each source dir (auth-service) -> values key (authService)
      #         and set the whole image string to the freshly pushed ECR tag.
      - name: Update image tags in helm/cloudkitchen/values.yaml
        env:
          NEW_TAG: ${{ steps.vars.outputs.sha }}
        run: |
          set -euo pipefail
          FILE="helm/cloudkitchen/values.yaml"
          SERVICES="auth-service user-service restaurant-service menu-service \
                    order-service payment-service delivery-service \
                    notification-service frontend"

          # kebab-case dir -> camelCase values key (auth-service -> authService).
          to_camel() {
            local IFS='-'; read -ra p <<< "$1"; local out="${p[0]}"
            for w in "${p[@]:1}"; do out+="${w^}"; done
            echo "$out"
          }

          for svc in $SERVICES; do
            key="$(to_camel "$svc")"
            img="${ECR_REGISTRY}/${IMAGE_PREFIX}/${svc}:${NEW_TAG}"
            echo "Setting .${key}.image = ${img}"
            yq -i ".${key}.image = \"${img}\"" "$FILE"
          done
          echo "----- resulting $FILE -----"
          cat "$FILE"

      # ---- 5. Commit & push the updated tags. ArgoCD takes it from here. ------
      - name: Commit & push GitOps update
        env:
          NEW_TAG: ${{ steps.vars.outputs.sha }}
        run: |
          set -euo pipefail
          git config user.name "cloudkitchen-ci[bot]"
          git config user.email "ci-bot@cloudkitchen.example.com"
          # No-op safely if nothing changed (e.g. re-run on same SHA).
          if git diff --quiet -- helm/cloudkitchen/values.yaml; then
            echo "No image tag changes to commit."
            exit 0
          fi
          git add helm/cloudkitchen/values.yaml
          git commit -m "ci(gitops): bump image tags to ${NEW_TAG} [skip ci]"
          git push origin main
