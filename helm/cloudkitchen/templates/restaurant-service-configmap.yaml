apiVersion: v1
kind: ConfigMap
metadata:
  name: restaurant-service-config
  namespace: {{ .Values.namespace }}
  labels:
    app: restaurant-service
data:
  SERVICE_NAME: "restaurant-service"
  PORT: "{{ .Values.restaurantService.port }}"
  LOG_LEVEL: "info"
  DB_HOST: {{ .Values.db.host | quote }}
  DB_PORT: {{ .Values.db.port | quote }}
  DB_NAME: {{ .Values.db.name | quote }}
  DB_SCHEMA: "restaurants"
  DB_SSLMODE: {{ .Values.db.sslmode | quote }}
  REDIS_ADDR: "{{ .Values.redis.servicename }}:{{ .Values.redis.port }}"
