apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: {{ .Values.namespace }}
  labels:
    app: notification-service
data:
  SERVICE_NAME: "notification-service"
  PORT: "{{ .Values.notificationService.port }}"
  LOG_LEVEL: "info"
  DB_HOST: {{ .Values.db.host | quote }}
  DB_PORT: {{ .Values.db.port | quote }}
  DB_NAME: {{ .Values.db.name | quote }}
  DB_SCHEMA: "notifications"
  DB_SSLMODE: {{ .Values.db.sslmode | quote }}
  REDIS_ADDR: "{{ .Values.redis.servicename }}:{{ .Values.redis.port }}"
