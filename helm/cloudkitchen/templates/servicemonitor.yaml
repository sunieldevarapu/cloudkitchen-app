{{- if .Values.observability.enabled -}}
# =============================================================================
# ServiceMonitor — tells Prometheus to scrape all 8 backend microservices.
#
# Each cloudkitchen Service is labeled `app.kubernetes.io/part-of: cloudkitchen`
# (see <svc>-service.yaml templates), and exposes /metrics on the http port.
# Prometheus (from kube-prometheus-stack) auto-discovers ServiceMonitors in
# every namespace because we set
#   prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues: false
# in argocd/apps/app-monitoring.yaml — so this single resource is enough to
# get all 8 services scraped.
#
# Frontend, postgres, redis, nats are intentionally NOT selected — they don't
# expose /metrics (frontend = nginx static, postgres/redis/nats use their own
# exporters if needed in Phase 6+).
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cloudkitchen-services
  namespace: {{ .Values.namespace }}
  labels:
    # release label is what makes kube-prom-stack's default selector match,
    # in case anyone tightens serviceMonitorSelector later.
    release: kube-prometheus
spec:
  namespaceSelector:
    matchNames:
      - {{ .Values.namespace }}
  selector:
    matchLabels:
      app.kubernetes.io/part-of: cloudkitchen
  endpoints:
    - port: http               # the Service port name (not the number)
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
{{- end }}
