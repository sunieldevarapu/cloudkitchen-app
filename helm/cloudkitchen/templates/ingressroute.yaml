{{- if .Values.ingress.enabled -}}
{{- /*
   Build the multi-host matcher ONCE, here at the top, so every route below
   stays short and readable.

   For ingress.hosts = [a, b] this renders:
     (Host(`a`) || Host(`b`))

   Why OR'd Host()s and not Host(`a`,`b`)?  Traefik v3's Host() accepts ONLY
   ONE hostname per call. The comma form fails parsing with
     "Host: unexpected number of parameters; got 2, expected one of [1]"
   and silently disables every router on this IngressRoute.
*/ -}}
{{- $hostExprs := list -}}
{{- range .Values.ingress.hosts -}}{{- $hostExprs = append $hostExprs (printf "Host(`%s`)" .) -}}{{- end -}}
{{- $hostMatch := printf "(%s)" (join " || " $hostExprs) -}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cloudkitchen
  namespace: {{ .Values.namespace }}
  labels:
    app: cloudkitchen
spec:
  entryPoints:
    - {{ .Values.ingress.entryPoint }}
  routes:
    # --- menu sub-paths under /api/restaurants (higher priority) ---
    - match: {{ $hostMatch }} && PathRegexp(`^/api/restaurants/[^/]+/(menu|categories|items)`)
      kind: Rule
      priority: 200
      services:
        - name: {{ .Values.menuService.servicename }}
          port: {{ .Values.menuService.port }}
    - match: {{ $hostMatch }} && PathPrefix(`/api/menu`)
      kind: Rule
      priority: 200
      services:
        - name: {{ .Values.menuService.servicename }}
          port: {{ .Values.menuService.port }}
    # --- one rule per service ---
    - match: {{ $hostMatch }} && PathPrefix(`/api/auth`)
      kind: Rule
      priority: 100
      services:
        - name: {{ .Values.authService.servicename }}
          port: {{ .Values.authService.port }}
    - match: {{ $hostMatch }} && PathPrefix(`/api/users`)
      kind: Rule
      priority: 100
      services:
        - name: {{ .Values.userService.servicename }}
          port: {{ .Values.userService.port }}
    - match: {{ $hostMatch }} && PathPrefix(`/api/restaurants`)
      kind: Rule
      priority: 100
      services:
        - name: {{ .Values.restaurantService.servicename }}
          port: {{ .Values.restaurantService.port }}
    - match: {{ $hostMatch }} && (PathPrefix(`/api/cart`) || PathPrefix(`/api/orders`))
      kind: Rule
      priority: 100
      services:
        - name: {{ .Values.orderService.servicename }}
          port: {{ .Values.orderService.port }}
    - match: {{ $hostMatch }} && PathPrefix(`/api/payments`)
      kind: Rule
      priority: 100
      services:
        - name: {{ .Values.paymentService.servicename }}
          port: {{ .Values.paymentService.port }}
    - match: {{ $hostMatch }} && PathPrefix(`/api/deliveries`)
      kind: Rule
      priority: 100
      services:
        - name: {{ .Values.deliveryService.servicename }}
          port: {{ .Values.deliveryService.port }}
    - match: {{ $hostMatch }} && PathPrefix(`/api/notifications`)
      kind: Rule
      priority: 100
      services:
        - name: {{ .Values.notificationService.servicename }}
          port: {{ .Values.notificationService.port }}
    # --- frontend catch-all (lowest priority) ---
    - match: {{ $hostMatch }} && PathPrefix(`/`)
      kind: Rule
      priority: 1
      services:
        - name: {{ .Values.frontend.servicename }}
          port: 80
  {{- if .Values.ingress.tls }}
  tls:
    secretName: {{ .Values.ingress.tlsSecretName }}
  {{- end }}
{{- end }}
