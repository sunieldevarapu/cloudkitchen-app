apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-service-config
  namespace: {{ .Values.namespace }}
  labels:
    app: payment-service
data:
  SERVICE_NAME: "payment-service"
  PORT: "{{ .Values.paymentService.port }}"
  LOG_LEVEL: "info"
  DB_HOST: {{ .Values.db.host | quote }}
  DB_PORT: {{ .Values.db.port | quote }}
  DB_NAME: {{ .Values.db.name | quote }}
  DB_SCHEMA: "payments"
  DB_SSLMODE: {{ .Values.db.sslmode | quote }}
  REDIS_ADDR: "{{ .Values.redis.servicename }}:{{ .Values.redis.port }}"
