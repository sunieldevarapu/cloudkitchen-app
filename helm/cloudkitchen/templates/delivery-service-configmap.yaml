apiVersion: v1
kind: ConfigMap
metadata:
  name: delivery-service-config
  namespace: {{ .Values.namespace }}
  labels:
    app: delivery-service
data:
  SERVICE_NAME: "delivery-service"
  PORT: "{{ .Values.deliveryService.port }}"
  LOG_LEVEL: "info"
  DB_HOST: {{ .Values.db.host | quote }}
  DB_PORT: {{ .Values.db.port | quote }}
  DB_NAME: {{ .Values.db.name | quote }}
  DB_SCHEMA: "delivery"
  DB_SSLMODE: {{ .Values.db.sslmode | quote }}
  REDIS_ADDR: "{{ .Values.redis.servicename }}:{{ .Values.redis.port }}"
