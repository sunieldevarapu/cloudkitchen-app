# prometheus-values.yaml
# -----------------------------------------------------------------------------
# Helm values for the kube-prometheus-stack chart.
#
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm upgrade --install kube-prom-stack prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace -f monitoring/prometheus-values.yaml
#
# The CloudKitchen Go services each expose Prometheus metrics on :8080/metrics
# and are annotated with:
#     prometheus.io/scrape: "true"
#     prometheus.io/port:   "8080"
#     prometheus.io/path:   "/metrics"
#
# We support BOTH discovery models:
#   1. ServiceMonitor (preferred, declarative)   -> see monitoring/servicemonitor.yaml
#   2. Annotation-based scraping (additionalScrapeConfigs below) as a fallback
#      so that any pod carrying the standard prometheus.io/* annotations is
#      picked up automatically.
# -----------------------------------------------------------------------------

fullnameOverride: kube-prom-stack

# --- Allow Prometheus to discover ServiceMonitors in ALL namespaces ----------
prometheus:
  prometheusSpec:
    # Do not restrict ServiceMonitors/PodMonitors to the helm release labels.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false

    retention: 15d
    scrapeInterval: 30s
    evaluationInterval: 30s

    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        memory: 2Gi

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 30Gi

    # -------------------------------------------------------------------------
    # Annotation-based scraping fallback.
    # Scrapes any pod with prometheus.io/scrape=true. Honors prometheus.io/port
    # and prometheus.io/path overrides; defaults to 8080 and /metrics.
    # -------------------------------------------------------------------------
    additionalScrapeConfigs:
      - job_name: cloudkitchen-pods-annotation
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - cloudkitchen
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels:
              [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: app

# --- Alertmanager ------------------------------------------------------------
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi

# --- Grafana -----------------------------------------------------------------
grafana:
  enabled: true
  adminPassword: "changeme-use-a-secret"   # override via --set or a secret in real deployments
  defaultDashboardsTimezone: utc
  service:
    type: ClusterIP
  # Sidecar auto-imports dashboards from ConfigMaps labeled grafana_dashboard=1.
  # Load the JSON files in monitoring/grafana/dashboards/ as ConfigMaps with
  # that label, e.g.:
  #   kubectl -n monitoring create configmap ck-cpu-dashboard \
  #     --from-file=monitoring/grafana/dashboards/cpu-usage.json \
  #     --dry-run=client -o yaml | \
  #     kubectl label -f - grafana_dashboard=1 --local -o yaml | kubectl apply -f -
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      searchNamespace: ALL
    datasources:
      enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi

# --- Node / kube-state metrics (defaults are fine) ---------------------------
nodeExporter:
  enabled: true
kubeStateMetrics:
  enabled: true
