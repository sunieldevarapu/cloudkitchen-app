# SPA server + local API gateway.
#
# Serves the static React build and falls back to index.html so client-side
# routes (e.g. /orders/123) resolve. It ALSO reverse-proxies /api/* to the
# backend services on the docker-compose network — this mirrors what the Traefik
# IngressRoute does on Kubernetes, so the SPA can talk to every service through
# one origin during local testing.
#
# Listens on :8080 so the container can run as the non-root `nginx` user
# (ports <1024 require privileges the unprivileged user does not have).

# Docker's embedded DNS — lets nginx resolve service names like `auth`.

server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---- API gateway -------------------------------------------------------
    # NOTE: proxy_pass WITHOUT a trailing path preserves the full request URI,
    # so /api/auth/login -> http://auth-service:8080/api/auth/login (the services route
    # their handlers under the same /api/<svc> prefixes).

    # menu-service owns the menu sub-paths under /api/restaurants/<id>/...
    # This regex location is evaluated before the /api/restaurants prefix below.
    location ~ ^/api/restaurants/[^/]+/(menu|categories|items) {
        proxy_pass http://menu-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/auth          { proxy_pass http://auth-service:8080;          proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /api/users         { proxy_pass http://user-service:8080;          proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /api/restaurants   { proxy_pass http://restaurant-service:8080;    proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /api/menu          { proxy_pass http://menu-service:8080;          proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /api/cart          { proxy_pass http://order-service:8080;         proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /api/orders        { proxy_pass http://order-service:8080;         proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /api/payments      { proxy_pass http://payment-service:8080;       proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /api/deliveries    { proxy_pass http://delivery-service:8080;      proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /api/notifications { proxy_pass http://notification-service:8080;  proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }

    # ---- static assets -----------------------------------------------------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unknown path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
